<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" /> <stop offset="100%" style="stop-color:#001A33;stop-opacity:1" /> </linearGradient>

    <mask id="glassMask">
      <rect x="20" y="20" width="160" height="160" rx="40" ry="40" fill="white" />
    </mask>

    <linearGradient id="mainGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.8" />
      <stop offset="25%" style="stop-color:white;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>

    <radialGradient id="bottomShine" cx="70%" cy="80%" r="50%" fx="70%" fy="80%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.6" /> <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="topShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.5" />
      <stop offset="30%" style="stop-color:#000;stop-opacity:0" />
    </linearGradient>

  </defs>

  <use href="#globalBg" />

  <g>
    <rect x="20" y="20" width="160" height="160" rx="40" ry="40" fill="url(#baseGrad)" />
    
    <rect x="20" y="20" width="160" height="160" rx="40" ry="40" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.7"/>

    <rect x="20" y="20" width="160" height="160" rx="40" ry="40" fill="url(#mainGloss)" mask="url(#glassMask)" />
    
    <rect x="20" y="20" width="160" height="160" rx="40" ry="40" fill="url(#bottomShine)" mask="url(#glassMask)" />

    <rect x="20" y="20" width="160" height="160" rx="40" ry="40" fill="url(#topShadow)" mask="url(#glassMask)" />
  </g>

  <g transform="translate(65, 60)" fill="white" opacity="0.9">
    <rect x="0" y="0" width="14" height="80" rx="7" />
    
    <path d="M14 25 C 30 25, 55 10, 55 10 C 55 10, 60 20, 45 35 C 35 45, 14 50, 14 50 Z" />
    
    <path d="M14 55 C 30 55, 60 70, 60 70 C 60 70, 55 85, 40 80 C 30 75, 14 65, 14 65 Z" />
    
    <circle cx="70" cy="40" r="7" />
  </g>

</svg>
